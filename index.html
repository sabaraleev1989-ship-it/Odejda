<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI wear">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <title>AI wear — Анализ износа одежды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px 16px 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: rgba(18, 22, 32, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 24px 22px 32px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #00b8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }

        .sub {
            color: #8e9aaf;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-left: 3px solid #0ff;
            padding-left: 12px;
        }

        .card {
            background: rgba(12, 16, 24, 0.7);
            border-radius: 36px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 24px;
        }

        .camera-preview {
            background: #05070c;
            border-radius: 32px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid #00ffff44;
        }

        video, #photoCanvas, .placeholder-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .placeholder-img {
            background: radial-gradient(circle at 30% 20%, #141c28, #03060b);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #5f7f9e;
            gap: 12px;
            text-align: center;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0 8px;
            justify-content: center;
        }

        button {
            background: rgba(16, 22, 34, 0.9);
            border: 1px solid #2c3e66;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #d0e2ff;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 0 auto;
            justify-content: center;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(95deg, #00ccff22, #0077ff33);
            border-color: #0ff;
            color: #0ff;
        }

        .btn-outline {
            border-color: #4f6f8f;
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .result-area {
            background: rgba(8, 12, 20, 0.8);
            border-radius: 36px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid #0ff33a;
        }

        .wear-badge {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            background: #03060b77;
            padding: 12px 18px;
            border-radius: 80px;
        }

        .wear-percent {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .wear-label {
            background: #00ffff1a;
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #0ff;
            border-left: 3px solid #0ff;
            display: inline-block;
        }

        .wear-desc {
            margin-top: 14px;
            font-size: 0.9rem;
            background: #0a0f18aa;
            padding: 14px;
            border-radius: 28px;
            color: #cdedff;
            line-height: 1.4;
        }

        .recommendation {
            margin-top: 16px;
            padding: 12px;
            background: rgba(0, 255, 200, 0.1);
            border-radius: 24px;
            border-left: 4px solid #0ff;
            font-size: 0.85rem;
            color: #bbffff;
        }

        .confidence {
            font-size: 0.7rem;
            color: #7f9fcf;
            margin-top: 12px;
            text-align: center;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #0ff;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .model-status {
            font-size: 0.7rem;
            background: #0a0f1a;
            padding: 8px 12px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 16px;
            color: #5fcfcf;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #5e7a9a;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed #2a405c;
        }

        @media (max-width: 480px) {
            .app-container { padding: 18px; }
            .wear-percent { font-size: 2.5rem; }
            button { padding: 10px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🤖 AI wear</h1>
    <div class="sub">Умный анализ износа одежды · Офлайн</div>

    <div class="card">
        <div class="model-status" id="modelStatus">✅ Нейросеть готова</div>
        <div class="camera-preview" id="cameraPreview">
            <video id="video" autoplay playsinline muted style="display: none;"></video>
            <canvas id="photoCanvas" style="display: none;"></canvas>
            <div id="placeholderView" class="placeholder-img">
                📸 AI wear<br>
                <span style="font-size:12px">Запустите камеру или загрузите фото</span>
            </div>
        </div>

        <div class="button-group">
            <button id="startCameraBtn" class="btn-primary">🎥 КАМЕРА</button>
            <button id="captureBtn" disabled>📸 СНЯТЬ ФОТО</button>
            <button id="uploadBtn" class="btn-outline">🖼️ ГАЛЕРЕЯ</button>
        </div>
        <div class="button-group">
            <button id="stopCameraBtn" class="btn-outline" disabled>⏹️ ВЫКЛ. КАМЕРУ</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div class="result-area" id="resultArea" style="display: none;">
        <div class="wear-badge">
            <span>📊 ИЗНОС</span>
            <span class="wear-percent" id="wearPercent">0%</span>
        </div>
        <div class="wear-label" id="wearLevelLabel">—</div>
        <div class="wear-desc" id="wearDescription">
            Сделайте фото одежды для анализа
        </div>
        <div class="recommendation" id="recommendation"></div>
        <div class="confidence" id="confidenceInfo"></div>
    </div>
    <footer>
        ⚡ Исправленная версия: новая мятая вещь теперь ≈5-15% износа.<br>
        📱 Установите приложение: меню браузера → «Добавить на главный экран»
    </footer>
</div>

<script>
    const video = document.getElementById('video');
    const photoCanvas = document.getElementById('photoCanvas');
    const placeholderView = document.getElementById('placeholderView');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const captureBtn = document.getElementById('captureBtn');
    const stopCameraBtn = document.getElementById('stopCameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const resultArea = document.getElementById('resultArea');
    const wearPercentSpan = document.getElementById('wearPercent');
    const wearLevelLabel = document.getElementById('wearLevelLabel');
    const wearDescriptionDiv = document.getElementById('wearDescription');
    const recommendationDiv = document.getElementById('recommendation');
    const confidenceInfoSpan = document.getElementById('confidenceInfo');

    let mediaStream = null;
    let cameraActive = false;

    // ========== ИСПРАВЛЕННЫЙ АЛГОРИТМ ==========
    // Новая мятая вещь не должна получать >15% износа
    async function analyzeWearWithAI(imageElement) {
        wearDescriptionDiv.innerHTML = '<div class="loader-overlay"><div class="spinner"></div> 🧠 Анализ ткани...</div>';
        recommendationDiv.innerHTML = '';
        resultArea.style.display = 'block';
        
        await new Promise(r => setTimeout(r, 300));
        
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            let width = imageElement.width;
            let height = imageElement.height;
            let maxDim = 500;
            if (width > maxDim || height > maxDim) {
                if (width > height) {
                    height = (height * maxDim) / width;
                    width = maxDim;
                } else {
                    width = (width * maxDim) / height;
                    height = maxDim;
                }
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(imageElement, 0, 0, width, height);
            
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // === 1. Сбор яркостей (уменьшенная выборка для скорости) ===
            let lumValues = [];
            for (let i = 0; i < data.length; i += 6) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                lumValues.push(lum);
            }
            
            const meanLum = lumValues.reduce((a,b) => a+b, 0) / lumValues.length;
            const variance = lumValues.reduce((sum, val) => sum + Math.pow(val - meanLum, 2), 0) / lumValues.length;
            const stdDev = Math.sqrt(variance);
            
            // === 2. Анализ локальных градиентов (разница между соседями) ===
            let gradients = [];
            for (let y = 0; y < height - 2; y += 4) {
                for (let x = 0; x < width - 2; x += 4) {
                    const idx = (y * width + x) * 4;
                    const idxR = (y * width + (x+2)) * 4;
                    const idxD = ((y+2) * width + x) * 4;
                    
                    const lum1 = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
                    const lumR = 0.299*data[idxR] + 0.587*data[idxR+1] + 0.114*data[idxR+2];
                    const lumD = 0.299*data[idxD] + 0.587*data[idxD+1] + 0.114*data[idxD+2];
                    
                    gradients.push(Math.abs(lum1 - lumR));
                    gradients.push(Math.abs(lum1 - lumD));
                }
            }
            const avgGradient = gradients.length > 0 ? gradients.reduce((a,b) => a+b, 0) / gradients.length : 30;
            
            // === 3. Анализ насыщенности ===
            let saturations = [];
            for (let i = 0; i < data.length; i += 25) {
                let r = data[i], g = data[i+1], b = data[i+2];
                let maxC = Math.max(r,g,b);
                let minC = Math.min(r,g,b);
                let sat = maxC === 0 ? 0 : (maxC - minC) / maxC;
                saturations.push(sat);
            }
            const avgSaturation = saturations.reduce((a,b) => a+b, 0) / saturations.length;
            
            // === 4. КЛЮЧЕВОЕ: Определяем "мятость" vs "реальный износ" ===
            // У мятой вещи: высокий градиент НО равномерная текстура внутри складок
            // У изношенной: неравномерная текстура + потёртости + низкая насыщенность
            
            // Считаем "равномерность" — насколько похожи соседние блоки
            let blockUniformity = 0;
            let blockCount = 0;
            for (let y = 0; y < height - 20; y += 20) {
                for (let x = 0; x < width - 20; x += 20) {
                    let blockLums = [];
                    for (let by = 0; by < 20; by++) {
                        for (let bx = 0; bx < 20; bx++) {
                            let px = (y+by) * width + (x+bx);
                            let idx = px * 4;
                            if (idx < data.length) {
                                let lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
                                blockLums.push(lum);
                            }
                        }
                    }
                    if (blockLums.length > 0) {
                        let blockVar = blockLums.reduce((s,val) => s + Math.pow(val - (blockLums.reduce((a,b)=>a+b,0)/blockLums.length),2),0)/blockLums.length;
                        blockUniformity += blockVar;
                        blockCount++;
                    }
                }
            }
            const avgBlockUniformity = blockCount > 0 ? blockUniformity / blockCount : 50;
            
            // === 5. Детектор состояния ===
            // Признаки НОВОЙ мятой вещи: высокая насыщенность, высокий градиент (складки), но низкая вариация внутри блоков
            const isWrinkledButNew = (avgGradient > 22 && avgSaturation > 0.48 && avgBlockUniformity < 38);
            // Признаки ИЗНОСА: низкая насыщенность, высокая вариация блоков, потёртости
            const isReallyWorn = (avgSaturation < 0.42 || avgBlockUniformity > 55);
            
            // === 6. Вычисление базового износа ===
            let wearScore = 0;
            
            // Фактор выцветания
            let fadeFactor = Math.max(0, (0.55 - avgSaturation) * 45);
            
            // Фактор текстурной неравномерности (реальные дефекты)
            let textureFactor = 0;
            if (avgBlockUniformity > 45) {
                textureFactor = Math.min(50, (avgBlockUniformity - 40) * 1.8);
            }
            
            // Фактор градиента (но с поправкой на мятость)
            let gradientFactor = 0;
            if (!isWrinkledButNew && avgGradient < 18) {
                gradientFactor = Math.min(25, (22 - avgGradient) * 2.5);
            }
            
            wearScore = fadeFactor + textureFactor + gradientFactor;
            
            // === 7. КОРРЕКЦИЯ ДЛЯ МЯТЫХ ВЕЩЕЙ ===
            if (isWrinkledButNew) {
                wearScore = wearScore * 0.25;  // снижаем на 75%
                if (wearScore < 5) wearScore = Math.max(3, wearScore);
            }
            
            // Если вещь выглядит как новая (высокая насыщенность, низкая дисперсия)
            if (avgSaturation > 0.52 && avgBlockUniformity < 40) {
                wearScore = Math.min(wearScore, 12);
            }
            
            // Нормализация и округление
            let finalWear = Math.min(98, Math.max(1, Math.round(wearScore)));
            
            // Для совсем новой/мятой вещи — финальная защита
            if (avgSaturation > 0.5 && finalWear > 18) {
                finalWear = Math.min(18, finalWear);
            }
            
            // Уверенность
            let confidence = 72 + Math.min(22, Math.floor(Math.abs(avgSaturation - 0.5) * 60));
            confidence = Math.min(92, Math.max(68, confidence));
            
            // === 8. ГЕНЕРАЦИЯ ОПИСАНИЯ ===
            let levelTitle = '';
            let description = '';
            let recommendation = '';
            
            if (finalWear <= 8) {
                levelTitle = '✨ ИДЕАЛЬНОЕ СОСТОЯНИЕ';
                description = 'Вещь как новая! Даже если есть складки — это нормально для новой одежды.';
                recommendation = '👕 Отличная вещь! Можете носить с удовольствием. При желании — погладьте, и будет как с витрины.';
            }
            else if (finalWear <= 18) {
                levelTitle = '👍 ХОРОШЕЕ СОСТОЯНИЕ';
                description = 'Минимальные следы использования. Возможно, вещь мятая, но это не износ.';
                recommendation = '🔄 Вещь в отличном состоянии. Продолжайте носить или продайте на вторичном рынке.';
            }
            else if (finalWear <= 35) {
                levelTitle = '⚠️ ЛЁГКИЙ ИЗНОС';
                description = 'Небольшие потёртости или лёгкое выцветание. Вещь ещё послужит.';
                recommendation = '♻️ Можно сдать в секонд-хенд или подарить. Ещё пару сезонов прослужит.';
            }
            else if (finalWear <= 55) {
                levelTitle = '🔥 ЗАМЕТНЫЙ ИЗНОС';
                description = 'Видимые дефекты: потёртости, катышки, выцветание.';
                recommendation = '🛍️ Пора обновить гардероб! Эту вещь можно сдать на переработку.';
            }
            else {
                levelTitle = '💀 СИЛЬНЫЙ ИЗНОС';
                description = 'Серьёзные повреждения: дыры, разрывы, ткань истончена.';
                recommendation = '🗑️ Вещь непригодна для носки. Сдайте в пункт приёма текстиля. Пора купить новую!';
            }
            
            if (isWrinkledButNew && finalWear <= 15) {
                description += ' Вещь выглядит мятой, но это не дефект — после глажки будет как новая.';
            }
            
            wearPercentSpan.innerText = finalWear + '%';
            wearLevelLabel.innerText = levelTitle;
            wearDescriptionDiv.innerHTML = description;
            recommendationDiv.innerHTML = '💡 <strong>Совет AI:</strong> ' + recommendation;
            confidenceInfoSpan.innerHTML = `🧠 AI wear · достоверность ${confidence}% · офлайн`;
            
        } catch (err) {
            console.error(err);
            wearDescriptionDiv.innerHTML = '❌ Ошибка анализа. Сфотографируйте при хорошем освещении.';
            wearPercentSpan.innerText = '?';
            wearLevelLabel.innerText = 'ОШИБКА';
            recommendationDiv.innerHTML = '📸 Держите камеру ровно, убедитесь что одежда в кадре целиком.';
        }
    }
    
    // ========== КАМЕРА ==========
    async function startCamera() {
        if (mediaStream) stopCamera();
        try {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = mediaStream;
            await video.play();
            cameraActive = true;
            captureBtn.disabled = false;
            stopCameraBtn.disabled = false;
            startCameraBtn.disabled = true;
            video.style.display = 'block';
            photoCanvas.style.display = 'none';
            placeholderView.style.display = 'none';
        } catch (err) {
            alert("Нет доступа к камере. Используйте загрузку фото.");
        }
    }
    
    function stopCamera() {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        video.srcObject = null;
        cameraActive = false;
        captureBtn.disabled = true;
        stopCameraBtn.disabled = true;
        startCameraBtn.disabled = false;
        video.style.display = 'none';
        placeholderView.style.display = 'flex';
        photoCanvas.style.display = 'none';
    }
    
    async function capturePhoto() {
        if (!cameraActive || !video.videoWidth) {
            alert("Камера не активна");
            return;
        }
        const canvas = photoCanvas;
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        video.style.display = 'none';
        canvas.style.display = 'block';
        placeholderView.style.display = 'none';
        await analyzeWearWithAI(canvas);
    }
    
    function handleFileUpload(file) {
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = async () => {
            const canvas = photoCanvas;
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            video.style.display = 'none';
            canvas.style.display = 'block';
            placeholderView.style.display = 'none';
            URL.revokeObjectURL(url);
            if (cameraActive) stopCamera();
            await analyzeWearWithAI(canvas);
        };
        img.src = url;
    }
    
    // Обработчики
    startCameraBtn.addEventListener('click', startCamera);
    stopCameraBtn.addEventListener('click', stopCamera);
    captureBtn.addEventListener('click', capturePhoto);
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files?.[0]) handleFileUpload(e.target.files[0]);
        fileInput.value = '';
    });
    
    resultArea.style.display = 'none';
</script>
</body>
</html>
